# SOC 2 Type II: change-management evidence (automated build + dependency gate).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Dependency audit (critical gate)
        run: npm run audit:ci

      - name: High-severity report (non-blocking)
        run: npm run audit:report
